<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0f14">
<link rel="manifest" href="manifest.json">
<title>Stat IQ</title>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:#0b0f14;color:#e4e8ef}
button{font-family:inherit;cursor:pointer;border:none;outline:none;background:none;color:inherit}
input,select{font-family:inherit;outline:none}
:root{
  --bg:#0b0f14;--bg2:#12171e;--bg3:#1a2029;--bgc:#151b24;
  --brd:#242d3a;--brd2:#3a4555;--t1:#e4e8ef;--t2:#8a95a8;--t3:#556070;
  --acc:#00c978;--acc2:#00a862;--accbg:rgba(0,201,120,.1);
  --red:#ef4460;--redbg:rgba(239,68,96,.1);--orn:#f59e42;--ornbg:rgba(245,158,66,.1);
  --blue:#4a8ff5;--bluebg:rgba(74,143,245,.1);
  --fd:'Oswald',sans-serif;--fb:'Inter',sans-serif;
  --sh:0 8px 32px rgba(0,0,0,.5);--tr:all .12s ease;
  --my:#00c978;--mybg:rgba(0,201,120,.08);
  --opp:#f07040;--oppbg:rgba(240,112,64,.08);
  --glow:0 0 20px rgba(0,201,120,.15);
}
.screen{display:none;width:100%;height:100%}.screen.active{display:flex}

/* HOME */
#home{flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:40px;background:linear-gradient(180deg,#0b0f14 0%,#0f1820 100%);overflow-y:auto;-webkit-overflow-scrolling:touch}
#auth-section{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:4px}
#auth-section .auth-login-btn{padding:10px 24px;border-radius:10px;background:var(--accbg);border:1px solid var(--acc);color:var(--acc);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;transition:var(--tr);font-family:var(--fb)}
#auth-section .auth-login-btn:hover{background:var(--acc);color:#0b0f14;box-shadow:var(--glow)}
#auth-section .auth-user{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--bg2);border:1px solid var(--brd);border-radius:10px}
#auth-section .auth-user img{width:28px;height:28px;border-radius:50%;border:1px solid var(--brd)}
#auth-section .auth-user span{font-size:12px;color:var(--t2)}
#auth-section .auth-logout{padding:5px 12px;border-radius:6px;background:var(--bgc);border:1px solid var(--brd);color:var(--t2);font-size:11px;cursor:pointer;font-family:var(--fb)}
.logo{font-family:var(--fd);font-size:56px;font-weight:700;letter-spacing:6px;color:var(--acc);text-shadow:0 0 40px rgba(0,201,120,.2)}.logo span{color:var(--t1)}
.subtitle{font-size:12px;color:var(--t3);letter-spacing:3px;text-transform:uppercase;margin-top:-6px;font-weight:500}
.hbtns{display:flex;flex-direction:column;gap:8px;width:360px;margin-top:24px}
.hbtn{padding:14px 20px;background:var(--bg2);border:1px solid var(--brd);border-radius:10px;font-size:14px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:12px;transition:var(--tr)}.hbtn:hover{border-color:var(--acc);background:var(--accbg);box-shadow:var(--glow)}
.ic{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.ic.g{background:var(--accbg);color:var(--acc)}.ic.b{background:var(--bluebg);color:var(--blue)}.ic.o{background:var(--ornbg);color:var(--orn)}.ic.r{background:var(--oppbg);color:var(--opp)}

/* MODAL */
.mover{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:100}.mover.on{display:flex}
.mdl{background:var(--bg2);border:1px solid var(--brd);border-radius:14px;padding:24px;width:520px;max-height:85vh;overflow-y:auto;box-shadow:var(--sh)}.mdl.wide{width:720px}
.mdl h2{font-family:var(--fd);font-size:20px;font-weight:600;margin-bottom:16px;color:var(--acc)}
.mdl label{display:block;font-size:11px;font-weight:700;color:var(--t3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.8px}
.mdl input,.mdl select{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--brd);border-radius:8px;color:var(--t1);font-size:14px;margin-bottom:14px;transition:var(--tr)}.mdl input:focus{border-color:var(--acc);box-shadow:0 0 0 2px rgba(0,201,120,.15)}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.bp{padding:10px 24px;background:var(--acc);color:#0b0f14;font-weight:700;border-radius:8px;font-size:13px;transition:var(--tr)}.bp:hover{background:var(--acc2);box-shadow:var(--glow)}
.bs2{padding:10px 24px;background:var(--bg3);color:var(--t2);font-weight:600;border-radius:8px;font-size:13px;border:1px solid var(--brd)}.bs2:hover{border-color:var(--t2)}
.ple{margin:8px 0}.pr{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.pr input{margin-bottom:0;flex:1}.pr input.ni{width:55px;flex:none;text-align:center}
.pr .rb{width:28px;height:28px;border-radius:6px;background:var(--redbg);color:var(--red);font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.apb{padding:7px 14px;border:1px dashed var(--brd);border-radius:8px;color:var(--t3);font-size:12px;width:100%;margin-top:2px;transition:var(--tr)}.apb:hover{border-color:var(--acc);color:var(--acc)}
.tab-row{display:flex;gap:4px;margin-bottom:12px}.tab-btn{flex:1;padding:8px;border-radius:6px;background:var(--bg3);border:1px solid var(--brd);font-size:12px;font-weight:600;color:var(--t2);text-align:center}.tab-btn.on{background:var(--accbg);border-color:var(--acc);color:var(--acc)}
.tab-panel{display:none}.tab-panel.on{display:block}
.saved-teams{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.st-chip{padding:6px 12px;border-radius:6px;background:var(--bg3);border:1px solid var(--brd);font-size:12px;font-weight:600;color:var(--t2);display:flex;align-items:center;gap:6px;transition:var(--tr)}
.st-chip:hover{border-color:var(--opp);color:var(--opp)}
.st-chip .st-del{font-size:14px;color:var(--red);opacity:0;transition:var(--tr)}.st-chip:hover .st-del{opacity:1}

/* GAME — Pro scoreboard */
#game{flex-direction:column;height:100vh;background:#0b0f14}
.sb{display:flex;align-items:center;justify-content:center;padding:4px 16px;background:linear-gradient(180deg,#141c25 0%,#0f151c 100%);border-bottom:2px solid var(--acc);flex-shrink:0;height:52px;position:relative}
.sb::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--acc),transparent)}
.sb-t{display:flex;align-items:center;gap:10px}.sb-tn{font-family:var(--fd);font-size:15px;font-weight:600;letter-spacing:2px;text-transform:uppercase}.sb-tn.my{color:var(--my)}.sb-tn.opp{color:var(--opp)}
.sb-sc{font-family:var(--fd);font-size:38px;font-weight:700;min-width:52px;text-align:center;line-height:1;text-shadow:0 2px 12px rgba(0,0,0,.4)}
.sb-qs{display:flex;gap:3px;margin:0 6px}.sb-q{display:flex;flex-direction:column;align-items:center}.sb-ql{font-size:7px;color:var(--t3);font-weight:700;letter-spacing:1px}.sb-qv{font-size:11px;font-weight:700;color:var(--t2)}.sb-qv.aq{color:var(--acc)}
.sb-mid{margin:0 14px}.sb-qn{font-family:var(--fd);font-size:14px;color:var(--acc);font-weight:700;letter-spacing:2px;padding:3px 10px;background:rgba(0,201,120,.1);border-radius:4px}
.tb{display:flex;align-items:center;gap:5px;padding:4px 10px;background:var(--bg2);border-bottom:1px solid var(--brd);flex-shrink:0}
.tbb{padding:6px 12px;border-radius:6px;font-size:11px;font-weight:700;background:var(--bg3);border:1px solid var(--brd);color:var(--t2);white-space:nowrap;letter-spacing:.3px;transition:var(--tr)}.tbb:hover{border-color:var(--acc);color:var(--acc);background:var(--accbg)}.tbb.on{background:var(--accbg);border-color:var(--acc);color:var(--acc)}
.tbs{flex:1}
.gm{display:flex;flex:1;overflow:hidden}

/* Player cols — sleek cards */
.pcol{width:128px;padding:5px;background:var(--bg2);display:flex;flex-direction:column;gap:2px;overflow-y:auto;flex-shrink:0}
.pcol.left{border-right:1px solid var(--brd)}.pcol.right{border-left:1px solid var(--brd)}
.clbl{font-size:8px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;padding:4px 6px;margin-bottom:1px}
.pbtn{padding:7px 8px;border-radius:7px;background:var(--bgc);border:2px solid transparent;display:flex;align-items:center;gap:6px;min-height:36px;transition:var(--tr)}
.pbtn:hover{border-color:var(--brd2);background:var(--bg3)}.pbtn.sel{border-color:var(--acc);background:var(--accbg);box-shadow:inset 0 0 0 1px rgba(0,201,120,.15)}.pbtn.osel{border-color:var(--opp);background:var(--oppbg)}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}.dot.on{background:var(--acc);box-shadow:0 0 4px var(--acc)}.dot.off{background:var(--t3)}.dot.oon{background:var(--opp);box-shadow:0 0 4px var(--opp)}
.pn{font-family:var(--fd);font-size:16px;font-weight:700;min-width:26px}.pnm{font-size:10px;font-weight:500;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pbtn.dragging{opacity:.4;border-style:dashed}
.pbtn.drop-target{border-color:var(--acc);background:var(--accbg);box-shadow:0 0 12px rgba(0,201,120,.25)}
.pbtn.drop-target-opp{border-color:var(--opp);background:var(--oppbg);box-shadow:0 0 12px rgba(240,112,64,.25)}
.drag-ghost{position:fixed;pointer-events:none;z-index:200;padding:8px 8px;border-radius:8px;background:var(--bg2);border:2px solid var(--acc);display:flex;align-items:center;gap:6px;min-height:36px;opacity:.92;box-shadow:var(--sh);font-family:inherit;color:var(--t1)}
.drag-ghost.opp-g{border-color:var(--opp)}

/* Stats cols — large tap targets */
.scol{width:142px;padding:5px;display:flex;flex-direction:column;gap:3px;overflow-y:auto;flex-shrink:0;background:var(--bg)}
.scol.ls{border-right:1px solid var(--brd)}.scol.rs{border-left:1px solid var(--brd)}
.sst{font-size:8px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;padding:3px 0;border-bottom:1px solid var(--brd);margin-bottom:3px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:4px}
.stb{padding:10px 4px;border-radius:8px;background:var(--bgc);border:1px solid var(--brd);text-align:center;transition:var(--tr)}
.stb:hover{border-color:var(--acc2);background:var(--accbg)}.stb:active{transform:scale(.95)}
.stb.oh:hover{border-color:var(--opp);background:var(--oppbg)}
.sl2{font-size:10px;font-weight:700;color:var(--t3);display:block;letter-spacing:.5px}.sv2{font-family:var(--fd);font-size:22px;font-weight:700;color:var(--t1);display:block;margin-top:1px}
.psum{margin-top:auto;padding:8px;background:var(--bg3);border-radius:8px;border:1px solid var(--brd)}
.psum-n{font-family:var(--fd);font-size:11px;font-weight:700;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.5px}.psum-n.mc{color:var(--my)}.psum-n.oc{color:var(--opp)}
.psum-g{display:grid;grid-template-columns:repeat(4,1fr);gap:2px}
.psum-i{text-align:center}.psum-i .ll{font-size:7px;color:var(--t3);font-weight:700;letter-spacing:.5px}.psum-i .vv{font-size:14px;font-weight:700;color:var(--t1)}

/* Courts — maximize for iPad */
.ccol{flex:1;display:flex;flex-direction:column;padding:2px;gap:1px;overflow:hidden;min-width:0;margin:0 auto}
.cw{flex:1;position:relative;min-height:0;display:flex;flex-direction:column;border-radius:4px;overflow:hidden}
.cw-hdr{display:flex;align-items:center;justify-content:space-between;padding:1px 6px;flex-shrink:0;height:18px}
.cl{font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:1.5px;padding:1px 6px;border-radius:3px}
.cl.ml{color:var(--my);background:rgba(0,201,120,.12)}.cl.ol{color:var(--opp);background:rgba(240,112,64,.12)}
.cl-rot{padding:2px 7px;border-radius:4px;font-size:13px;font-weight:700;background:rgba(255,255,255,.08);color:var(--t3);border:1px solid rgba(255,255,255,.1);cursor:pointer;line-height:1;transition:var(--tr)}.cl-rot:hover{background:rgba(255,255,255,.18);color:var(--t1)}
.cw canvas{flex:1;display:block;min-height:0}
.spop{position:fixed;display:none;background:var(--bg2);border:1px solid var(--brd);border-radius:10px;padding:8px;box-shadow:var(--sh);z-index:50;gap:6px}.spop.on{display:flex}
.spb{padding:12px 18px;border-radius:8px;font-family:var(--fd);font-size:14px;font-weight:700;letter-spacing:1px}
.spb.made{background:rgba(0,201,120,.15);color:var(--my);border:1px solid var(--my)}.spb.made:hover{background:rgba(0,201,120,.3)}
.spb.miss{background:var(--redbg);color:var(--red);border:1px solid var(--red)}.spb.miss:hover{background:rgba(239,68,96,.25)}
.spb.cnc{background:var(--bg3);color:var(--t3);border:1px solid var(--brd);font-size:10px;padding:8px 12px}

/* Box score — clean white-on-dark */
.bso{position:fixed;inset:0;background:rgba(5,8,12,.92);backdrop-filter:blur(8px);display:none;z-index:80;overflow-y:auto;padding:16px}.bso.on{display:block}
.bsc{max-width:1100px;margin:0 auto}
.bsh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--acc)}
.bsh h2{font-family:var(--fd);font-size:24px;font-weight:700;color:var(--t1);letter-spacing:2px}
.bsx{width:34px;height:34px;border-radius:8px;background:var(--bg3);border:1px solid var(--brd);color:var(--t2);font-size:18px;display:flex;align-items:center;justify-content:center;transition:var(--tr)}.bsx:hover{border-color:var(--red);color:var(--red)}
.btl{font-family:var(--fd);font-size:15px;font-weight:700;margin:20px 0 8px;padding:6px 10px;border-radius:6px;letter-spacing:1px}.btl.ml{color:var(--my);background:var(--mybg);border-left:3px solid var(--my)}.btl.ol{color:var(--opp);background:var(--oppbg);border-left:3px solid var(--opp)}
.bt{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px}
.bt th{padding:7px 6px;text-align:center;font-size:9px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;border-bottom:2px solid var(--brd);background:var(--bg2)}.bt th:first-child{text-align:left}
.bt td{padding:7px 6px;text-align:center;border-bottom:1px solid rgba(36,45,58,.6);color:var(--t2);font-weight:500}.bt td:first-child{text-align:left;font-weight:700;color:var(--t1)}
.bt tr:hover td{background:rgba(255,255,255,.02)}
.bt tr.tot td{font-weight:800;color:var(--t1);border-top:2px solid var(--acc);background:var(--accbg)}.bt .hi{color:var(--acc);font-weight:800}
.bs-charts{display:flex;gap:10px;margin:12px 0 8px;flex-wrap:wrap}
.bs-chart-wrap{background:var(--bg3);border:1px solid var(--brd);border-radius:10px;padding:10px;min-width:0}
.bs-chart-wrap.main{flex:3;min-width:280px}
.bs-chart-wrap.sub{flex:1.5;min-width:180px}
.bs-chart-wrap>div>canvas{width:100%!important;height:auto!important}
.bs-chart-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.bs-chart-title{font-family:var(--fd);font-size:12px;font-weight:700;letter-spacing:.5px}
.q-filter{display:flex;gap:3px}
.q-fb{padding:5px 10px;border-radius:5px;font-size:10px;font-weight:700;background:var(--bg3);border:1px solid var(--brd);color:var(--t3);transition:var(--tr)}.q-fb.on{background:var(--accbg);border-color:var(--acc);color:var(--acc)}
.pnav{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:6px}
.pnav-btn{width:28px;height:28px;border-radius:6px;background:var(--bg3);border:1px solid var(--brd);color:var(--t2);font-size:14px;display:flex;align-items:center;justify-content:center}.pnav-btn:hover{border-color:var(--acc);color:var(--acc)}
.pnav-name{font-family:var(--fd);font-size:14px;font-weight:600;min-width:100px;text-align:center}

/* History */
#hist{flex-direction:column;padding:20px 32px;background:var(--bg)}
.hhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}.hhdr h2{font-family:var(--fd);font-size:22px;font-weight:700;color:var(--t1);letter-spacing:1px}
.bk{padding:8px 16px;border-radius:8px;background:var(--bg3);border:1px solid var(--brd);color:var(--t2);font-size:12px;font-weight:700;transition:var(--tr)}.bk:hover{border-color:var(--acc);color:var(--acc)}
.ghl{display:flex;flex-direction:column;gap:6px;overflow-y:auto;flex:1}
.ghi{padding:14px 18px;background:var(--bg2);border:1px solid var(--brd);border-radius:10px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:var(--tr)}.ghi:hover{border-color:var(--acc);box-shadow:var(--glow)}
.ghi-d{font-size:11px;color:var(--t3);min-width:90px;font-weight:500}.ghi-t{font-family:var(--fd);font-size:14px;font-weight:600;flex:1;letter-spacing:.5px}
.ghi-s{font-family:var(--fd);font-size:20px;font-weight:700;color:var(--acc)}
.ghi-x{padding:5px 10px;border-radius:5px;background:var(--redbg);color:var(--red);font-size:11px;font-weight:700;opacity:0;transition:var(--tr)}.ghi:hover .ghi-x{opacity:1}
.empty{text-align:center;padding:50px;color:var(--t3);font-size:14px}
.subp{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--bg2);border:1px solid var(--brd);border-radius:14px;padding:20px;width:420px;box-shadow:var(--sh);z-index:90;display:none}.subp.on{display:block}
.subp h3{font-family:var(--fd);font-size:16px;color:var(--acc);margin-bottom:10px}
.subg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.subpl{padding:8px;border-radius:6px;background:var(--bgc);border:1px solid var(--brd);text-align:center;font-size:11px}.subpl:hover{border-color:var(--acc)}.subpl.onc{border-color:var(--acc);background:var(--accbg)}.subpl.onco{border-color:var(--opp);background:var(--oppbg)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:2px}

/* Event log overlay */
.elo{position:fixed;top:0;right:0;width:260px;height:100%;background:var(--bg2);border-left:1px solid var(--brd);display:none;flex-direction:column;z-index:75;box-shadow:-4px 0 24px rgba(0,0,0,.5)}.elo.on{display:flex}
.elog-hdr{padding:10px 12px;font-size:10px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between}
.elog-close{width:28px;height:28px;border-radius:6px;background:var(--bg3);border:1px solid var(--brd);color:var(--t2);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--tr)}.elog-close:hover{border-color:var(--red);color:var(--red)}
.elog-list{flex:1;overflow-y:auto;padding:4px}
.elog-item{padding:6px 8px;border-radius:6px;font-size:11px;color:var(--t2);border-bottom:1px solid rgba(36,45,58,.3);display:flex;align-items:center;gap:5px;transition:var(--tr)}
.elog-item:hover{background:var(--bg3)}
.elog-item .elog-q{font-family:var(--fd);font-size:10px;font-weight:700;color:var(--t3);min-width:22px}
.elog-item .elog-pn{font-family:var(--fd);font-weight:700;color:var(--t1);min-width:30px}
.elog-item .elog-act{flex:1;font-size:10px}
.elog-item .elog-del{font-size:12px;color:var(--red);opacity:0;padding:2px 5px;border-radius:4px;transition:var(--tr);cursor:pointer}
.elog-item:hover .elog-del{opacity:1}
.elog-item .elog-del:hover{background:var(--redbg)}

/* Pending action state — player buttons pulse when waiting for selection */

</style>

<div class="subp" id="sub-pop"><h3 id="sub-tl">交代</h3><p style="font-size:11px;color:var(--t2);margin-bottom:10px">タップでON/OFF</p><div class="subg" id="sub-gr"></div><div class="mact" style="margin-top:12px"><button class="bs2" onclick="closeSub()">閉じる</button></div></div>

<script>
var myTeam={name:'',players:[]}, G=null, games=[], oppTeams=[];
var myTeams=[], activeTeamIdx=0; // multiple teams
var selSide='my', selId=null, pending={my:null,opp:null}, cd={my:{},opp:{}};
var bsQFilter='all', bsPlayerIdx={my:-1,opp:-1}, bsFlipChart=false;
var courtRotation={my:0,opp:0}; // per-team: 0, 90, 180, 270

// Persist
function save(){localStorage.setItem('siq_t',JSON.stringify(myTeam));localStorage.setItem('siq_g',JSON.stringify(games));localStorage.setItem('siq_o',JSON.stringify(oppTeams));localStorage.setItem('siq_mt',JSON.stringify(myTeams));localStorage.setItem('siq_ati',activeTeamIdx);if(G)localStorage.setItem('siq_c',JSON.stringify(G));var now=Date.now();localStorage.setItem('siq_upd',now);window._localUpdatedAt=now}
function load(){try{let t=localStorage.getItem('siq_t');if(t)myTeam=JSON.parse(t);let g=localStorage.getItem('siq_g');if(g)games=JSON.parse(g);let o=localStorage.getItem('siq_o');if(o)oppTeams=JSON.parse(o);let c=localStorage.getItem('siq_c');if(c)G=JSON.parse(c);let mt=localStorage.getItem('siq_mt');if(mt)myTeams=JSON.parse(mt);let ai=localStorage.getItem('siq_ati');if(ai!==null)activeTeamIdx=parseInt(ai)||0;let lu=localStorage.getItem('siq_upd');window._localUpdatedAt=lu?parseInt(lu):0}catch(e){}
  // Migration: if myTeams empty but myTeam has data, seed it
  if(!myTeams.length&&myTeam.name){myTeam.id=uid();myTeams.push(JSON.parse(JSON.stringify(myTeam)));activeTeamIdx=0;save()}
  // Migration: ensure all players have IDs
  let needSave=false;
  [myTeam].concat(myTeams).forEach(t=>{if(t&&t.players)t.players.forEach(p=>{if(!p.id){p.id=uid();needSave=true}})});
  if(needSave)save();
  // Migration: recalculate zone/is3pt/st for all shot events (fixes coordinate mismatch)
  migrateZones();
}
function migrateZones(){
  let changed=false;
  function fixEvents(evts,qsArr){
    if(!evts)return;
    // Reset quarter scores from events
    let recalcScore=false;
    evts.forEach(ev=>{
      if(ev.type!=='SHOT'||ev.x===undefined||ev.y===undefined)return;
      const newZone=getZone(ev.x,ev.y);
      const new3=is3pt(ev.x,ev.y);
      const newSt=new3?'3PT':'2PT';
      const newPts=ev.made?(new3?3:2):0;
      if(ev.zone!==newZone||ev.st!==newSt||ev.pts!==newPts){
        ev.zone=newZone;ev.is3=new3;ev.st=newSt;ev.pts=newPts;
        changed=true;recalcScore=true;
      }
    });
    return recalcScore;
  }
  // Fix current game
  if(G&&G.events){
    if(fixEvents(G.events)){
      // Recalculate quarter scores from events
      G.myQS=new Array(G.quarters).fill(0);G.oppQS=new Array(G.quarters).fill(0);
      G.events.forEach(ev=>{if(ev.pts&&ev.made)(ev.side==='my'?G.myQS:G.oppQS)[ev.q]+=ev.pts});
    }
  }
  // Fix saved games
  games.forEach(g=>{
    if(!g.data||!g.data.events)return;
    if(fixEvents(g.data.events)){
      // Recalculate saved quarter scores
      const nq=g.data.quarters||4;
      g.data.myQS=new Array(nq).fill(0);g.data.oppQS=new Array(nq).fill(0);
      g.data.events.forEach(ev=>{if(ev.pts&&ev.made)(ev.side==='my'?g.data.myQS:g.data.oppQS)[ev.q]+=ev.pts});
      g.myScore=g.data.myQS.reduce((a,b)=>a+b,0);
      g.oppScore=g.data.oppQS.reduce((a,b)=>a+b,0);
    }
  });
  if(changed)save();
}

// Nav
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');
  if(id==='hist')renderHist();if(id==='career')renderCareer();if(id==='game'){renderPlayers();updateAll();requestAnimationFrame(()=>requestAnimationFrame(()=>{drawCourt('my');drawCourt('opp')}))}}
function openM(id){document.getElementById(id).classList.add('on')}
function closeM(id){document.getElementById(id).classList.remove('on')}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function addPR(lid,n='',nm='',pid=''){const l=document.getElementById(lid),r=document.createElement('div');r.className='pr';if(pid)r.dataset.pid=pid;r.innerHTML=`<input class="ni" type="text" placeholder="#" value="${n}" maxlength="3"><input type="text" placeholder="名前" value="${nm}"><button class="rb" onclick="this.parentElement.remove()">×</button>`;l.appendChild(r)}

// My Team — multi-team management
function openTeamSetup(){
  renderMyTeamList();
  // Reset form for new team
  document.getElementById('tm-edit-idx').value='-1';
  document.getElementById('tm-form-title').textContent='新しいチームを追加';
  document.getElementById('tm-name').value='';
  const l=document.getElementById('tm-list');l.innerHTML='';
  for(let i=0;i<5;i++)addPR('tm-list');
  openM('tm-modal');
}
function renderMyTeamList(){
  const el=document.getElementById('tm-saved-list');if(!el)return;
  if(!myTeams.length){el.innerHTML='<div style="font-size:12px;color:var(--t3);padding:8px">保存されたチームはありません</div>';return}
  let h='';
  myTeams.forEach((t,i)=>{
    const isActive=i===activeTeamIdx;
    h+=`<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;margin-bottom:4px;border:1px solid ${isActive?'var(--acc)':'var(--brd)'};background:${isActive?'var(--accbg)':'var(--bg3)'};cursor:pointer" onclick="switchMyTeam(${i})">
      <span style="font-family:var(--fd);font-size:14px;font-weight:700;flex:1;color:${isActive?'var(--acc)':'var(--t1)'}">${t.name||'NO NAME'}</span>
      <span style="font-size:11px;color:var(--t3)">${t.players.length}名</span>
      ${isActive?'<span style="font-size:9px;color:var(--acc);font-weight:700;padding:2px 6px;border:1px solid var(--acc);border-radius:4px">使用中</span>':''}
      <button style="font-size:11px;color:var(--blue);padding:3px 8px;border:1px solid var(--brd);border-radius:4px;background:var(--bg3)" onclick="event.stopPropagation();editMyTeam(${i})">編集</button>
      <button style="font-size:11px;color:var(--red);padding:3px 8px;border:1px solid var(--brd);border-radius:4px;background:var(--bg3)" onclick="event.stopPropagation();delMyTeam(${i})">削除</button>
    </div>`;
  });
  el.innerHTML=h;
}
function switchMyTeam(idx){
  if(idx<0||idx>=myTeams.length)return;
  activeTeamIdx=idx;
  myTeam=JSON.parse(JSON.stringify(myTeams[idx]));
  save();renderMyTeamList();
}
function editMyTeam(idx){
  const t=myTeams[idx];if(!t)return;
  document.getElementById('tm-edit-idx').value=idx;
  document.getElementById('tm-form-title').textContent=t.name+' を編集';
  document.getElementById('tm-name').value=t.name||'';
  const l=document.getElementById('tm-list');l.innerHTML='';
  if(t.players.length)t.players.forEach(p=>addPR('tm-list',p.number,p.name,p.id||''));
  else for(let i=0;i<5;i++)addPR('tm-list');
}
function delMyTeam(idx){
  if(!confirm(myTeams[idx].name+'を削除しますか？'))return;
  myTeams.splice(idx,1);
  if(activeTeamIdx>=myTeams.length)activeTeamIdx=Math.max(0,myTeams.length-1);
  if(myTeams.length)myTeam=JSON.parse(JSON.stringify(myTeams[activeTeamIdx]));
  else myTeam={name:'',players:[]};
  save();renderMyTeamList();
}
function saveTeam(){
  const name=document.getElementById('tm-name').value.trim()||'MY TEAM';
  const players=[];
  document.querySelectorAll('#tm-list .pr').forEach(r=>{const i=r.querySelectorAll('input'),n=i[0].value.trim(),nm=i[1].value.trim();if(n||nm)players.push({number:n,name:nm||('選手'+n),id:r.dataset.pid||uid()})});
  const editIdx=parseInt(document.getElementById('tm-edit-idx').value);
  if(editIdx>=0&&editIdx<myTeams.length){
    // Preserve player IDs for existing players matched by position
    const oldP=myTeams[editIdx].players||[];
    players.forEach((p,pi)=>{if(!p.id&&oldP[pi]&&oldP[pi].id)p.id=oldP[pi].id});
    myTeams[editIdx].name=name;myTeams[editIdx].players=players;
    if(editIdx===activeTeamIdx)myTeam={name,players,id:myTeams[editIdx].id};
  }else{
    const newT={id:uid(),name,players};myTeams.push(newT);
    activeTeamIdx=myTeams.length-1;myTeam=JSON.parse(JSON.stringify(newT));
  }
  save();renderMyTeamList();
  // Reset form
  document.getElementById('tm-edit-idx').value='-1';
  document.getElementById('tm-form-title').textContent='新しいチームを追加';
  document.getElementById('tm-name').value='';
  const l=document.getElementById('tm-list');l.innerHTML='';for(let i=0;i<5;i++)addPR('tm-list');
}

// Opponent Team Manager
function openOppManager(){
  renderOppList();
  const l=document.getElementById('opp-new-list');l.innerHTML='';for(let i=0;i<5;i++)addPR('opp-new-list');
  document.getElementById('opp-new-name').value='';
  openM('opp-modal');
}
function renderOppList(){
  const el=document.getElementById('opp-saved-list');
  if(!oppTeams.length){el.innerHTML='<div style="color:var(--t3);font-size:13px;margin-bottom:8px">保存された相手チームはありません</div>';return}
  el.innerHTML='<label>保存済みチーム</label><div class="saved-teams">'+oppTeams.map((t,i)=>`<div class="st-chip"><span>${t.name} (${t.players.length}人)</span><span class="st-del" onclick="delOppTeam(${i},event)">✕</span></div>`).join('')+'</div>';
}
function saveOppTeam(){
  const name=document.getElementById('opp-new-name').value.trim();if(!name){alert('チーム名を入力してください');return}
  const ps=[];document.querySelectorAll('#opp-new-list .pr').forEach(r=>{const i=r.querySelectorAll('input'),n=i[0].value.trim(),nm=i[1].value.trim();if(n||nm)ps.push({number:n,name:nm||('選手'+n)})});
  if(!ps.length){alert('選手を1人以上登録してください');return}
  oppTeams.push({name,players:ps});save();renderOppList();
  document.getElementById('opp-new-name').value='';document.getElementById('opp-new-list').innerHTML='';for(let i=0;i<5;i++)addPR('opp-new-list');
}
function delOppTeam(i,e){e.stopPropagation();if(!confirm(`${oppTeams[i].name}を削除しますか？`))return;oppTeams.splice(i,1);save();renderOppList()}

// New Game
function openNewGame(){
  if(!myTeam.players.length){alert('先にチーム設定で選手を登録してください');return}
  document.getElementById('ng-opp').value='';document.getElementById('ng-date').value=new Date().toISOString().slice(0,10);document.getElementById('ng-gname').value='';
  // Saved opp team buttons
  const sel=document.getElementById('ng-opp-select');
  if(oppTeams.length){sel.innerHTML='<div class="saved-teams">'+oppTeams.map((t,i)=>`<button class="st-chip" onclick="loadOppForGame(${i})">${t.name}</button>`).join('')+'</div>'}else{sel.innerHTML=''}
  const ol=document.getElementById('ng-opp-list');ol.innerHTML='';for(let i=0;i<5;i++)addPR('ng-opp-list');
  renderSS('my');renderSS('opp');swTab('my');openM('ng-modal');
}
function loadOppForGame(i){

function drawCourt(side){
  const cv=document.getElementById('cv-'+side),wrap=document.getElementById('cw-'+side),rect=wrap.getBoundingClientRect(),W=rect.width,H=rect.height;
  if(W<20||H<20)return;
  const rot=courtRotation[side]||0;
  const isRotated=(rot===90||rot===270);
  // For 90/270 rotation, swap the effective drawing dimensions
  const drawW=isRotated?H:W, drawH=isRotated?W:H;
  cv.width=W*2;cv.height=H*2;cv.style.width=W+'px';cv.style.height=H+'px';
  const ctx=cv.getContext('2d');ctx.scale(2,2);
  // Apply rotation around canvas center
  if(rot){ctx.translate(W/2,H/2);ctx.rotate(rot*Math.PI/180);ctx.translate(-drawW/2,-drawH/2)}
  const PAD=6,pxX=(drawW-PAD*2)/15,pxY=(drawH-PAD*2)/14,px=Math.min(pxX,pxY);
  const tW=15*px,tH=14*px,oX=(drawW-tW)/2,oY=(drawH-tH)/2;
  cd[side]={px,oX,oY,rot,drawW,drawH,canvasW:W,canvasH:H};
  const TX=m=>oX+m*px, TY=m=>oY+(14-m)*px;

  // Wood floor
  const grd=ctx.createLinearGradient(oX,0,oX+tW,0);
  grd.addColorStop(0,'#e8c87a');grd.addColorStop(.15,'#f0d48a');grd.addColorStop(.35,'#f5dfa0');grd.addColorStop(.5,'#f7e4a8');grd.addColorStop(.65,'#f5dfa0');grd.addColorStop(.85,'#f0d48a');grd.addColorStop(1,'#e8c87a');
  ctx.fillStyle=grd;ctx.fillRect(oX,oY,tW,tH);
  for(let x=oX;x<oX+tW;x+=12){const s=(Math.floor((x-oX)/12)%2===0)?0.03:-0.02;ctx.fillStyle=s>0?`rgba(0,0,0,${s})`:`rgba(255,255,255,${-s})`;ctx.fillRect(x,oY,12,tH)}

  const LC='rgba(255,255,255,0.9)',LW=1.5;
  ctx.strokeStyle=LC;ctx.lineWidth=LW;
  ctx.strokeRect(oX,oY,tW,tH);

  // Basket end
  const cx=TX(7.5),baseY=TY(0),bOff=px*.55,bY=baseY-bOff;
  const kw=px*4.9,kx=cx-kw/2,kh=px*4.225,ftCY=bY-kh;
  const ftR=px*1.8,ncaR=px*1.25,r3=px*6.75,cdist=px*.9;
  const cxL=oX+cdist,cxR=oX+tW-cdist;

  // Lane fill
  ctx.fillStyle='rgba(220,100,30,.10)';ctx.fillRect(kx,ftCY,kw,baseY-ftCY);
  ctx.strokeStyle=LC;ctx.lineWidth=LW;
  ctx.strokeRect(kx,ftCY,kw,baseY-ftCY);

  // FT circle
  ctx.beginPath();ctx.arc(cx,ftCY,ftR,Math.PI,0,false);ctx.stroke();
  ctx.setLineDash([5,3]);ctx.beginPath();ctx.arc(cx,ftCY,ftR,0,Math.PI,false);ctx.stroke();ctx.setLineDash([]);

  // Backboard
  const bbW=px*1.83/2;ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(cx-bbW,baseY);ctx.lineTo(cx+bbW,baseY);ctx.stroke();ctx.lineWidth=LW;

  // Ring
  ctx.strokeStyle='#e65100';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,bY,Math.max(px*.225,1),0,Math.PI*2);ctx.stroke();
  ctx.strokeStyle=LC;ctx.lineWidth=LW;

  // No-charge
  ctx.beginPath();ctx.arc(cx,bY,ncaR,0,Math.PI,true);ctx.stroke();

  // 3pt line
  const dxL=cx-cxL,dxR=cxR-cx;
  const dyL=Math.sqrt(Math.max(0,r3*r3-dxL*dxL)),dyR=Math.sqrt(Math.max(0,r3*r3-dxR*dxR));
  ctx.beginPath();ctx.moveTo(cxL,baseY);ctx.lineTo(cxL,bY-dyL);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cxR,baseY);ctx.lineTo(cxR,bY-dyR);ctx.stroke();
  ctx.beginPath();ctx.arc(cx,bY,r3,Math.PI+Math.atan2(dyL,dxL),-Math.atan2(dyR,dxR),false);ctx.stroke();

  // Half court circle
  const halfY=TY(14);ctx.beginPath();ctx.arc(cx,halfY,px*1.8,0,Math.PI,false);ctx.stroke();

  // ===== ZONE LINES (visible, semi-transparent white) =====
  ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=1.2;ctx.setLineDash([6,4]);

  // FT line horizontal extensions
  ctx.beginPath();ctx.moveTo(oX,ftCY);ctx.lineTo(kx,ftCY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(kx+kw,ftCY);ctx.lineTo(oX+tW,ftCY);ctx.stroke();
  // Paint vertical center
  ctx.beginPath();ctx.moveTo(cx,baseY);ctx.lineTo(cx,ftCY);ctx.stroke();
  // Paint horizontal center
  const pmY=(baseY+ftCY)/2;
  ctx.beginPath();ctx.moveTo(kx,pmY);ctx.lineTo(kx+kw,pmY);ctx.stroke();
  // FT-width vertical extensions above FT
  ctx.beginPath();ctx.moveTo(kx,ftCY);ctx.lineTo(kx,halfY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(kx+kw,ftCY);ctx.lineTo(kx+kw,halfY);ctx.stroke();
  ctx.setLineDash([]);

  // Shot markers
  if(G) G.events.filter(e=>e.type==='SHOT'&&e.side===side).forEach(e=>{
    const sx=TX(e.x),sy=TY(e.y);
    if(e.made){ctx.beginPath();ctx.arc(sx,sy,4,0,Math.PI*2);ctx.fillStyle='rgba(0,230,138,.85)';ctx.fill();ctx.strokeStyle='#00e68a';ctx.lineWidth=.8;ctx.stroke()}
    else{ctx.strokeStyle='rgba(255,68,102,.85)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(sx-3,sy-3);ctx.lineTo(sx+3,sy+3);ctx.moveTo(sx+3,sy-3);ctx.lineTo(sx-3,sy+3);ctx.stroke()}
  });
  document.getElementById('cl-'+side).textContent=side==='my'?(myTeam.name||'MY TEAM'):(G?G.opponent:'OPP');
}

// Shared court drawing helper for box score charts

// FG% zone heatmap chart — pixel-scan approach ensures perfect match with getZone
function drawZoneChart(w,h,shots,flip){
  const cv=document.createElement('canvas');cv.width=w*2;cv.height=h*2;cv.style.width=w+'px';cv.style.height=h+'px';
  const ctx=cv.getContext('2d');ctx.scale(2,2);
  // If flip, mirror entire canvas
  if(flip){ctx.translate(w,h);ctx.scale(-1,-1)}

  // Stretched court: independent X/Y scales, small margin
  const mX=12,mT=10,mB=10;
  const pxX=(w-mX*2)/15, pxY=(h-mT-mB)/14;
  const tW=15*pxX, tH=14*pxY;
  const oX=mX, oY=mT;
  const TX=m=>oX+m*pxX, TY=m=>oY+(14-m)*pxY;
  // Inverse: pixel → meters
  const MX=px=>(px-oX)/pxX, MY=py=>14-(py-oY)/pxY;

  // Wood floor
  const grd=ctx.createLinearGradient(oX,0,oX+tW,0);
  grd.addColorStop(0,'#e8c87a');grd.addColorStop(.5,'#f7e4a8');grd.addColorStop(1,'#e8c87a');
  ctx.fillStyle=grd;ctx.fillRect(oX,oY,tW,tH);
  for(let x2=oX;x2<oX+tW;x2+=10){const s2=(Math.floor((x2-oX)/10)%2===0)?0.03:-0.02;ctx.fillStyle=s2>0?`rgba(0,0,0,${s2})`:`rgba(255,255,255,${-s2})`;ctx.fillRect(x2,oY,10,tH)}

  // ── Zone stats ──
  const zs={};ZONES.forEach(z=>{const a=shots.filter(e=>getZone(e.x,e.y)===z),m=a.filter(e=>e.made).length;zs[z]={made:m,total:a.length,pct:a.length?Math.round(m/a.length*100):0}});
  function zColor(z){
    const s=zs[z];if(!s||!s.total)return null;
    const a=0.15+s.pct/100*0.45;
    const sh=Math.max(60,Math.min(200,185-s.pct*1.2));
    return`rgba(${sh},${sh},${sh+10},${a})`;
  }

  // ── Pixel-scan zone fills (perfectly matches getZone) ──
  // Build color map per zone
  const zoneColors={};
  ZONES.forEach(z=>{const c=zColor(z);if(c)zoneColors[z]=c});
  // Scan every 2px for performance, fill 2x2 blocks
  const step=2;
  for(let py=oY;py<oY+tH;py+=step){
    for(let px=oX;px<oX+tW;px+=step){
      const mx=MX(px+step/2), my=MY(py+step/2);
      if(mx<0||mx>15||my<0||my>14)continue;
      const z=getDisplayZone(mx,my);
      const c=zoneColors[z];
      if(c){ctx.fillStyle=c;ctx.fillRect(px,py,step,step)}
    }
  }

  // ── Court lines ──
  // Key pixel coordinates for lines (using stretched scales)
  const cx=TX(7.5), baseY=TY(0), bOff=pxY*.55, bY=baseY-bOff;
  const kw=pxX*4.9, kx=cx-kw/2;
  const ftCY_px=TY(4.775); // FT line in pixels (matches getZone's ftY=4.775)
  const pmY2_px=TY(4.775/2); // paint mid horizontal
  const halfY=TY(14);
  const paintL=kx, paintR=kx+kw;
  const cxL=TX(0.9), cxR=TX(14.1); // corner lines

  // 3P arc: use ellipse for visual, with real court proportions
  const r3_m=6.75, bx_m=7.5, by_m=0.55;
  const rx3=r3_m*pxX, ry3=r3_m*pxY;
  const bY_arc=TY(by_m); // basket center for arc drawing
  const dxLpx=cx-cxL;
  const dyLpx=ry3*Math.sqrt(Math.max(0,1-(dxLpx/rx3)**2));
  const arcJY=bY_arc-dyLpx;
  const arcAngL=Math.atan2(dyLpx/ry3, dxLpx/rx3);
  const arcStart=Math.PI+arcAngL, arcEnd=-arcAngL;

  const LC='rgba(255,255,255,.85)',LW=1.2;
  ctx.strokeStyle=LC;ctx.lineWidth=LW;
  ctx.strokeRect(oX,oY,tW,tH);
  // Paint
  ctx.fillStyle='rgba(220,100,30,.06)';ctx.fillRect(kx,ftCY_px,kw,baseY-ftCY_px);
  ctx.strokeStyle=LC;ctx.lineWidth=LW;ctx.strokeRect(kx,ftCY_px,kw,baseY-ftCY_px);
  // FT circle (elliptical)
  const ftRx=pxX*1.8, ftRy=pxY*1.8;
  ctx.save();ctx.translate(cx,ftCY_px);ctx.scale(ftRx,ftRy);
  ctx.beginPath();ctx.arc(0,0,1,Math.PI,0);ctx.restore();ctx.stroke();
  ctx.save();ctx.translate(cx,ftCY_px);ctx.scale(ftRx,ftRy);
  ctx.setLineDash([4,3]);ctx.beginPath();ctx.arc(0,0,1,0,Math.PI);ctx.restore();ctx.stroke();ctx.setLineDash([]);
  // Backboard & ring
  ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx-pxX*.9,baseY);ctx.lineTo(cx+pxX*.9,baseY);ctx.stroke();ctx.lineWidth=LW;
  ctx.strokeStyle='#e65100';ctx.lineWidth=1.5;
  const ringR=Math.max(Math.min(pxX,pxY)*.225,1);
  ctx.beginPath();ctx.arc(cx,bY,ringR,0,Math.PI*2);ctx.stroke();
  ctx.strokeStyle=LC;ctx.lineWidth=LW;
  // NCA (elliptical)
  ctx.save();ctx.translate(cx,bY);ctx.scale(pxX*1.25,pxY*1.25);
  ctx.beginPath();ctx.arc(0,0,1,0,Math.PI,true);ctx.restore();ctx.stroke();
  // 3pt line (elliptical)
  ctx.beginPath();ctx.moveTo(cxL,baseY);ctx.lineTo(cxL,arcJY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cxR,baseY);ctx.lineTo(cxR,arcJY);ctx.stroke();
  ctx.save();ctx.translate(cx,bY_arc);ctx.scale(rx3,ry3);
  ctx.beginPath();ctx.arc(0,0,1,arcStart,arcEnd,false);ctx.restore();ctx.stroke();
  // Half circle
  ctx.save();ctx.translate(cx,halfY);ctx.scale(pxX*1.8,pxY*1.8);
  ctx.beginPath();ctx.arc(0,0,1,0,Math.PI);ctx.restore();ctx.stroke();

  // ── Zone separator dashes ──
  ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=1;ctx.setLineDash([5,4]);
  // FT line extension (sideline to paint) — this IS the MTL/MBL boundary
  ctx.beginPath();ctx.moveTo(oX,ftCY_px);ctx.lineTo(paintL,ftCY_px);ctx.stroke();
  ctx.beginPath();ctx.moveTo(paintR,ftCY_px);ctx.lineTo(oX+tW,ftCY_px);ctx.stroke();
  // Paint center vertical
  ctx.beginPath();ctx.moveTo(cx,baseY);ctx.lineTo(cx,ftCY_px);ctx.stroke();
  // Paint center horizontal
  ctx.beginPath();ctx.moveTo(paintL,pmY2_px);ctx.lineTo(paintR,pmY2_px);ctx.stroke();
  // Paint-width extension (FT line to half-court) — MTL/3WL boundary
  ctx.beginPath();ctx.moveTo(paintL,ftCY_px);ctx.lineTo(paintL,halfY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(paintR,ftCY_px);ctx.lineTo(paintR,halfY);ctx.stroke();
  ctx.setLineDash([]);

  // ── Labels ──
  const fsPct=Math.max(Math.min(pxX,pxY)*0.82,11);
  const fsSub=Math.max(Math.min(pxX,pxY)*0.48,7);

  function drawLabel(x,y,z){
    const s=zs[z];if(!s||!s.total)return;
    ctx.save();
    if(flip){ctx.translate(x,y);ctx.scale(-1,-1);ctx.translate(-x,-y)}
    ctx.textAlign='center';ctx.textBaseline='middle';
    // Badge background
    const bw=fsPct*2.6, bh=fsPct*1.7;
    ctx.fillStyle='rgba(10,14,26,.82)';
    const br=4;
    const bx=x-bw/2, by=y-bh/2;
    ctx.beginPath();ctx.moveTo(bx+br,by);ctx.lineTo(bx+bw-br,by);ctx.quadraticCurveTo(bx+bw,by,bx+bw,by+br);ctx.lineTo(bx+bw,by+bh-br);ctx.quadraticCurveTo(bx+bw,by+bh,bx+bw-br,by+bh);ctx.lineTo(bx+br,by+bh);ctx.quadraticCurveTo(bx,by+bh,bx,by+bh-br);ctx.lineTo(bx,by+br);ctx.quadraticCurveTo(bx,by,bx+br,by);ctx.fill();
    // Pct color: red→yellow→green gradient
    const pct=s.pct;
    let pctColor;
    if(pct>=50) pctColor='#00e68a';
    else if(pct>=35) pctColor='#ffcc33';
    else pctColor='#ff5566';
    // Pct text
    const yPct=y-fsSub*0.25;
    ctx.font=`700 ${fsPct}px 'Oswald',sans-serif`;
    ctx.fillStyle=pctColor;
    ctx.fillText(pct+'%',x,yPct);
    // Made/total
    const ySub=yPct+fsPct*0.48+2;
    ctx.font=`600 ${fsSub}px 'Inter',sans-serif`;
    ctx.fillStyle='rgba(255,255,255,.7)';
    ctx.fillText(s.made+'/'+s.total,x,ySub);
    ctx.restore();
  }

  // Labels use getZone boundary values for positioning (in meters → pixels)
  const pL_m=5.05, pR_m=9.95, ftY_m=4.775, pmY_m=4.775/2;

  // Paint (4 quadrants): y range 0-pmY / pmY-ftY
  drawLabel(TX((pL_m+7.5)/2), TY(pmY_m/2), 'PBL');
  drawLabel(TX((7.5+pR_m)/2), TY(pmY_m/2), 'PBR');
  drawLabel(TX((pL_m+7.5)/2), TY((pmY_m+ftY_m)/2), 'PTL');
  drawLabel(TX((7.5+pR_m)/2), TY((pmY_m+ftY_m)/2), 'PTR');

  // MBL/MBR: y range 0-ftY, outside paint, inside 3P
  drawLabel(TX((0.9+pL_m)/2), TY(ftY_m/2), 'MBL');
  drawLabel(TX((pR_m+14.1)/2), TY(ftY_m/2), 'MBR');

  // 3CL/3CR: y range 0-ftY, outside 3P
  drawLabel(TX(0.45), TY(ftY_m/2), '3CL');
  drawLabel(TX(14.55), TY(ftY_m/2), '3CR');

  // MTL/MTR: y > ftY, outside paint, inside 3P (elbow/wing mid-range)
  // y center between ftY(4.775) and arcTop(7.3), weighted down
  drawLabel(TX(3.8), TY(5.5), 'MTL');
  drawLabel(TX(11.2), TY(5.5), 'MTR');

  // MT: y > ftY, inside paint-width, inside 3P (nail/high post)
  const arcTopM=0.55+6.75; // 7.3
  drawLabel(TX(7.5), TY((ftY_m+arcTopM)/2), 'MT');

  // 3WL/3WR: y > ftY, outside 3P, x columns by pL/pR
  const wingY_m=(ftY_m+14)/2; // 9.9
  const wDy=wingY_m-0.55, wDx=Math.sqrt(Math.max(0,6.75*6.75-wDy*wDy));
  drawLabel(TX((0+7.5-wDx)/2), TY(wingY_m), '3WL');
  drawLabel(TX((7.5+wDx+15)/2), TY(wingY_m), '3WR');

  // 3T: y > ftY, outside 3P, x range pL-pR
  drawLabel(TX(7.5), TY((arcTopM+14)/2), '3T');

  return cv;
}

// Shot distribution dots chart (separate from FG%)
function drawShotDots(w,h,shots,teamColor,flip){
  const cv=document.createElement('canvas');cv.width=w*2;cv.height=h*2;cv.style.width=w+'px';cv.style.height=h+'px';
  const ctx=cv.getContext('2d');ctx.scale(2,2);
  if(flip){ctx.translate(w,h);ctx.scale(-1,-1)}
  const c=drawCourtOnCtx(ctx,w,h);
  const{TX,TY}=c;
  // Draw shot dots
  shots.forEach(e=>{
    const sx=TX(e.x),sy=TY(e.y);
    if(e.made){
      ctx.beginPath();ctx.arc(sx,sy,4,0,Math.PI*2);
      ctx.fillStyle=teamColor||'rgba(0,230,138,.8)';ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=.5;ctx.stroke();
    }else{
      ctx.strokeStyle='rgba(255,68,102,.8)';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(sx-3,sy-3);ctx.lineTo(sx+3,sy+3);ctx.moveTo(sx+3,sy-3);ctx.lineTo(sx-3,sy+3);ctx.stroke();
    }
  });
  return cv;
}

// Zone detection — uses 3P arc distance from basket center (7.5, 0.55)
// Basket center: x=7.5, y=0.55 (matches court drawing). 3P radius: 6.75m. Corner distance: 0.9m from sideline.
function is3pt(mx,my){
  if(mx<0.9||mx>14.1) return true;
  const dx=mx-7.5,dy=my-0.55;
  return Math.sqrt(dx*dx+dy*dy)>=6.75;
}
function getZone(mx,my){
  const pL=5.05,pR=9.95;
  const ftY=4.775,pmY=ftY/2;
  // Paint (4 zones): inside paint, below FT line
  if(mx>=pL&&mx<=pR&&my<=ftY){
    return my<=pmY?(mx<7.5?'PBL':'PBR'):(mx<7.5?'PTL':'PTR');
  }
  const three=is3pt(mx,my);
  // Below FT line, outside paint
  if(my<=ftY){
    if(three) return mx<7.5?'3CL':'3CR';
    return mx<7.5?'MBL':'MBR';
  }
  // Above FT line
  if(three){
    if(mx<pL) return '3WL';
    if(mx>pR) return '3WR';
    return '3T';
  }
  if(mx<pL) return 'MTL';
  if(mx>pR) return 'MTR';
  return 'MT';
}
// Display zone is now identical to getZone
function getDisplayZone(mx,my){return getZone(mx,my)}

// Drag-and-drop substitution state
const _drd={active:false,timer:null,ghost:null,srcSide:null,srcIdx:null,srcOnCourt:false,srcEl:null,startX:0,startY:0,didDrag:false,lastTarget:null};

document.addEventListener('pointermove',e=>{
  if(_drd.timer&&!_drd.active){
    const dx=e.clientX-_drd.startX,dy=e.clientY-_drd.startY;
    if(Math.abs(dx)>8||Math.abs(dy)>8){clearTimeout(_drd.timer);_drd.timer=null}
  }
  if(!_drd.active)return;
  e.preventDefault();
  if(_drd.ghost){_drd.ghost.style.left=(e.clientX-50)+'px';_drd.ghost.style.top=(e.clientY-20)+'px'}
  // Highlight drop target
  const el=document.elementFromPoint(e.clientX,e.clientY);
  const tgt=el?el.closest('.pbtn'):null;
  if(_drd.lastTarget&&_drd.lastTarget!==tgt){_drd.lastTarget.classList.remove('drop-target','drop-target-opp')}
  if(tgt&&tgt!==_drd.srcEl&&tgt.dataset.side===_drd.srcSide){
    tgt.classList.add(_drd.srcSide==='opp'?'drop-target-opp':'drop-target');_drd.lastTarget=tgt;
  }else{_drd.lastTarget=null}
});

document.addEventListener('pointerup',e=>{
  clearTimeout(_drd.timer);_drd.timer=null;
  if(!_drd.active){_drd.active=false;return}
  _drd.active=false;
  if(_drd.ghost){_drd.ghost.remove();_drd.ghost=null}
  if(_drd.srcEl)_drd.srcEl.classList.remove('dragging');
  if(_drd.lastTarget){_drd.lastTarget.classList.remove('drop-target','drop-target-opp');
    // Execute substitution
    const side=_drd.srcSide;
    const fromIdx=_drd.srcIdx;
    const toIdx=parseInt(_drd.lastTarget.dataset.idx);
    const fromOn=_drd.srcOnCourt;
    const toOn=_drd.lastTarget.dataset.oncourt==='1';
    if(side&&fromIdx!==toIdx){
      const oc=side==='my'?G.myOC:G.oppOC;
      if(fromOn&&!toOn){
        // On court → Bench: swap
        const i=oc.indexOf(fromIdx);if(i>=0){oc[i]=toIdx;save();renderPlayers()}
      }else if(!fromOn&&toOn){
        // Bench → On court: swap
        const i=oc.indexOf(toIdx);if(i>=0){oc[i]=fromIdx;save();renderPlayers()}
      }else if(fromOn&&toOn){
        // Both on court: swap positions in OC array
        const iA=oc.indexOf(fromIdx),iB=oc.indexOf(toIdx);
        if(iA>=0&&iB>=0){oc[iA]=toIdx;oc[iB]=fromIdx;save();renderPlayers()}
      }
      // Both bench: no action needed
    }
  }
  _drd.lastTarget=null;
});

function calcPS(side,pid,qf){
  let ev=G.events.filter(e=>e.side===side&&e.pid===pid);
  if(qf!=='all')ev=ev.filter(e=>e.q===qf);
  const s2=ev.filter(e=>e.type==='SHOT'&&e.st==='2PT'),s3=ev.filter(e=>e.type==='SHOT'&&e.st==='3PT');
  const twom=s2.filter(e=>e.made).length,twoa=s2.length;
  const twop=twoa?Math.round(twom/twoa*100):0;
  const fgm=twom+s3.filter(e=>e.made).length,fga=s2.length+s3.length;
  const tpm=s3.filter(e=>e.made).length,tpa=s3.length;
  const ftm=ev.filter(e=>e.type==='FT_MADE').length,fta=ftm+ev.filter(e=>e.type==='FT_MISS').length;
  const ftp=fta?Math.round(ftm/fta*100):0;
  const pts=ev.reduce((s,e)=>s+(e.pts||0),0);
  const or_=ev.filter(e=>e.type==='OR').length,dr_=ev.filter(e=>e.type==='DR').length;
  return{twom,twoa,twop,fgm,fga,tpm,tpa,ftm,fta,ftp,pts,or:or_,dr:dr_,reb:or_+dr_,ast:ev.filter(e=>e.type==='AST').length,stl:ev.filter(e=>e.type==='STL').length,blk:ev.filter(e=>e.type==='BLK').length,to:ev.filter(e=>e.type==='TO').length,pf:ev.filter(e=>e.type==='PF').length,def:ev.filter(e=>e.type==='DEF').length};
}
function calcEff(s){return(s.pts+s.reb+s.ast+s.stl+s.blk)-((s.fga-s.fgm)+(s.fta-s.ftm)+s.to)}

function getFilteredShots(side,pid,qf){
  let ev=G.events.filter(e=>e.type==='SHOT'&&e.side===side);
  if(pid>=0)ev=ev.filter(e=>e.pid===pid);
  if(qf!=='all')ev=ev.filter(e=>e.q===qf);
  return ev;
}

    all.forEach(s=>{const p=ps[s.i],eff=calcEff(s);

    const tot=all.reduce((t,s)=>{Object.keys(s).forEach(k=>{if(k!=='i')t[k]=(t[k]||0)+s[k]});return t},{});
    const teff=calcEff(tot),tfgp=tot.fga?Math.round(tot.fgm/tot.fga*100):0,ttp=tot.tpa?Math.round(tot.tpm/tot.tpa*100):0;
    const totFtp=tot.fta?Math.round(tot.ftm/tot.fta*100):0;

    fullH+=h;

  // Render all charts after single innerHTML set

      const dEl=document.getElementById('bs-dots-'+side);
      if(dEl){dEl.innerHTML='';dEl.appendChild(drawShotDots(300,260,allShots,teamColor,fl))}
      // Player charts (FG% + dots side by side)
      const prEl=document.getElementById('bs-player-row-'+side);
      if(prEl){prEl.innerHTML='';
        if(pidx>=0){
          const pShots=getFilteredShots(side,pidx,qf);
          const zc=drawZoneChart(440,280,pShots,fl);zc.style.cssText='max-width:55%;height:auto';
          const dc=drawShotDots(260,220,pShots,teamColor,fl);dc.style.cssText='max-width:35%;height:auto';
          prEl.appendChild(zc);prEl.appendChild(dc);
        }else{prEl.innerHTML='<div style="text-align:center;padding:30px;color:var(--t3);font-size:12px;width:100%">選手を選択してください</div>'}}
    });

}
function bsNavPlayer(side,dir){

  if(idx<-1)idx=ps.length-1;if(idx>=ps.length)idx=-1;

// ===== CAREER STATS =====
var careerTeamFilter='all'; // 'all' or team id
function renderCareer(){
  const ct=document.getElementById('career-ct');
  if(!games.length){ct.innerHTML='<div class="empty">まだ試合データがありません</div>';return}

  // Team filter tabs
  let filterH='<div style="display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap">';
  filterH+=`<button class="q-fb${careerTeamFilter==='all'?' on':''}" onclick="careerTeamFilter='all';renderCareer()">全チーム</button>`;
  myTeams.forEach(t=>{
    filterH+=`<button class="q-fb${careerTeamFilter===t.id?' on':''}" onclick="careerTeamFilter='${t.id}';renderCareer()">${t.name}</button>`;
  });
  filterH+='</div>';

  // Filter games by team
  const fg=careerTeamFilter==='all'?games:games.filter(g=>(g.myTeamId||'')=== careerTeamFilter);
  if(!fg.length){ct.innerHTML=filterH+'<div class="empty">このチームの試合データはありません</div>';return}
  const nG=fg.length;

  // Get team info for filtered view
  const filterTeam=careerTeamFilter==='all'?myTeam:myTeams.find(t=>t.id===careerTeamFilter)||myTeam;
  const filterTeamName=careerTeamFilter==='all'?'全チーム':filterTeam.name;

  // Gather stats for each player across filtered games
  function gatherPlayerStats(){
    const pMap={};
    fg.forEach(g=>{
      if(!g.data||!g.data.events)return;
      // Use game-time player snapshot if available, fallback to current team
      const ps=g.data.myPlayers||filterTeam.players;
      ps.forEach((p,pi)=>{
        // Use player ID if available, fallback to number+name
        const key=p.id||(p.number+'_'+p.name);
        if(!pMap[key])pMap[key]={id:p.id||'',number:p.number,name:p.name,gp:0,pts:0,twom:0,twoa:0,fgm:0,fga:0,tpm:0,tpa:0,ftm:0,fta:0,or:0,dr:0,reb:0,ast:0,stl:0,blk:0,to:0,pf:0,def:0,eff:0};
        // Update name/number to latest (in case they changed)
        if(p.id&&filterTeam.players){const cur=filterTeam.players.find(fp=>fp.id===p.id);if(cur){pMap[key].number=cur.number;pMap[key].name=cur.name}}
        const ev=g.data.events.filter(e=>e.side==='my'&&e.pid===pi);
        if(!ev.length)return;
        pMap[key].gp++;
        const s2=ev.filter(e=>e.type==='SHOT'&&e.st==='2PT'),s3=ev.filter(e=>e.type==='SHOT'&&e.st==='3PT');
        const twom=s2.filter(e=>e.made).length,twoa=s2.length;
        const fgm=twom+s3.filter(e=>e.made).length,fga=s2.length+s3.length;
        const tpm=s3.filter(e=>e.made).length,tpa=s3.length;
        const ftm=ev.filter(e=>e.type==='FT_MADE').length,fta=ftm+ev.filter(e=>e.type==='FT_MISS').length;
        const pts=ev.reduce((s,e)=>s+(e.pts||0),0);
        const or_=ev.filter(e=>e.type==='OR').length,dr_=ev.filter(e=>e.type==='DR').length;
        const ast=ev.filter(e=>e.type==='AST').length,stl=ev.filter(e=>e.type==='STL').length;
        const blk=ev.filter(e=>e.type==='BLK').length,to_=ev.filter(e=>e.type==='TO').length;
        const pf=ev.filter(e=>e.type==='PF').length,def_=ev.filter(e=>e.type==='DEF').length;
        pMap[key].pts+=pts;pMap[key].twom+=twom;pMap[key].twoa+=twoa;pMap[key].fgm+=fgm;pMap[key].fga+=fga;pMap[key].tpm+=tpm;pMap[key].tpa+=tpa;
        pMap[key].ftm+=ftm;pMap[key].fta+=fta;pMap[key].or+=or_;pMap[key].dr+=dr_;pMap[key].reb+=(or_+dr_);
        pMap[key].ast+=ast;pMap[key].stl+=stl;pMap[key].blk+=blk;pMap[key].to+=to_;pMap[key].pf+=pf;pMap[key].def+=def_;
        const eff=pts+(or_+dr_)+ast+stl+blk-(fga-fgm)-(fta-ftm)-to_;pMap[key].eff+=eff;
      });
    });
    return Object.values(pMap).sort((a,b)=>b.pts-a.pts);
  }

  // Team totals
  function teamTotals(){
    let t={gp:nG,pts:0,fgm:0,fga:0,tpm:0,tpa:0,ftm:0,fta:0,or:0,dr:0,reb:0,ast:0,stl:0,blk:0,to:0,pf:0,def:0,eff:0,myScore:0,oppScore:0};
    fg.forEach(g=>{
      t.myScore+=g.myScore||0;t.oppScore+=g.oppScore||0;
      if(!g.data||!g.data.events)return;
      g.data.events.filter(e=>e.side==='my').forEach(e=>{
        t.pts+=(e.pts||0);
        if(e.type==='SHOT'){t.fga++;if(e.made)t.fgm++;if(e.st==='3PT'){t.tpa++;if(e.made)t.tpm++}}
        if(e.type==='FT_MADE'){t.ftm++;t.fta++}if(e.type==='FT_MISS')t.fta++;
        if(e.type==='OR')t.or++;if(e.type==='DR')t.dr++;if(e.type==='OR'||e.type==='DR')t.reb++;
        if(e.type==='AST')t.ast++;if(e.type==='STL')t.stl++;if(e.type==='BLK')t.blk++;
        if(e.type==='TO')t.to++;if(e.type==='PF')t.pf++;if(e.type==='DEF')t.def++;
      });
    });
    t.eff=t.pts+t.reb+t.ast+t.stl+t.blk-(t.fga-t.fgm)-(t.fta-t.ftm)-t.to;
    return t;
  }

  const pStats=gatherPlayerStats(),tt=teamTotals();
  const fgp=tt.fga?Math.round(tt.fgm/tt.fga*100):0,tpp=tt.tpa?Math.round(tt.tpm/tt.tpa*100):0,ftp=tt.fta?Math.round(tt.ftm/tt.fta*100):0;
  const avg=v=>nG?(v/nG).toFixed(1):'0';

  let h=filterH;
  h+=`<div style="margin-bottom:20px">
    <div style="font-family:var(--fd);font-size:16px;color:var(--my);margin-bottom:6px">${filterTeamName} — ${nG}試合</div>
    <div style="display:flex;gap:4px;font-size:11px;color:var(--t2);flex-wrap:wrap;margin-bottom:10px">
      <span>${tt.myScore}得点 / ${tt.oppScore}失点</span>
      <span>（勝率: ${fg.filter(g=>g.myScore>g.oppScore).length}勝${fg.filter(g=>g.myScore<g.oppScore).length}敗）</span>
    </div>
  </div>`;

  // Team total & avg summary
  h+=`<div style="font-family:var(--fd);font-size:14px;color:var(--acc);margin-bottom:6px;border-bottom:1px solid var(--brd);padding-bottom:4px">チーム合計 / 1試合平均</div>`;
  h+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;margin-bottom:20px">`;
  const teamItems=[['PTS',tt.pts],['FGM/A',`${tt.fgm}/${tt.fga}`],['FG%',fgp+'%'],['3PM/A',`${tt.tpm}/${tt.tpa}`],['3P%',tpp+'%'],['FTM/A',`${tt.ftm}/${tt.fta}`],['FT%',ftp+'%'],['REB',tt.reb],['AST',tt.ast],['STL',tt.stl],['BLK',tt.blk],['TO',tt.to]];
  teamItems.forEach(([lbl,val])=>{
    const numVal=typeof val==='string'?null:val;
    const avgStr=numVal!==null?avg(numVal):'';
    h+=`<div style="background:var(--bgc);border:1px solid var(--brd);border-radius:6px;padding:8px;text-align:center">
      <div style="font-size:9px;color:var(--t3);font-weight:600">${lbl}</div>
      <div style="font-family:var(--fd);font-size:16px;font-weight:700;color:var(--t1)">${val}</div>
      ${avgStr?`<div style="font-size:9px;color:var(--acc)">Avg ${avgStr}</div>`:''}
    </div>`;
  });
  h+=`</div>`;

  // Player stats table — totals (now includes FT%)
  h+=`<div style="font-family:var(--fd);font-size:14px;color:var(--acc);margin-bottom:6px;border-bottom:1px solid var(--brd);padding-bottom:4px">選手別 — 累計</div>`;
  h+=buildCareerTable(pStats,false);

  // Player stats table — per game avg
  h+=`<div style="font-family:var(--fd);font-size:14px;color:var(--acc);margin:16px 0 6px;border-bottom:1px solid var(--brd);padding-bottom:4px">選手別 — 1試合平均</div>`;
  h+=buildCareerTable(pStats,true);

  // ===== RANKINGS =====
  h+=`<div style="font-family:var(--fd);font-size:14px;color:var(--acc);margin:20px 0 10px;border-bottom:1px solid var(--brd);padding-bottom:4px">ランキング（累計）</div>`;
  var rankCats=[
    {key:'pts',label:'得点',emoji:'🏀'},
    {key:'reb',label:'リバウンド',emoji:'💪'},
    {key:'ast',label:'アシスト',emoji:'🎯'},
    {key:'stl',label:'スティール',emoji:'🖐'},
    {key:'blk',label:'ブロック',emoji:'🛡'},
    {key:'tpm',label:'3P成功',emoji:'🔥'},
    {key:'fgm',label:'FG成功',emoji:'✅'},
    {key:'eff',label:'EFF',emoji:'⭐'}
  ];
  h+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px">`;
  rankCats.forEach(function(cat){
    var sorted=pStats.filter(function(p){return p[cat.key]>0}).sort(function(a,b){return b[cat.key]-a[cat.key]});
    h+=`<div style="background:var(--bgc);border:1px solid var(--brd);border-radius:8px;padding:10px">`;
    h+=`<div style="font-family:var(--fd);font-size:13px;font-weight:600;color:var(--t1);margin-bottom:6px">${cat.emoji} ${cat.label}</div>`;
    if(!sorted.length){h+=`<div style="font-size:11px;color:var(--t3)">データなし</div>`}
    else{
      sorted.forEach(function(p,i){
        var medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
        var bar=sorted[0][cat.key]>0?Math.round(p[cat.key]/sorted[0][cat.key]*100):0;
        h+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">`;
        h+=`<span style="font-size:12px;min-width:18px">${medal||'#'+(i+1)}</span>`;
        h+=`<span style="font-size:11px;color:var(--t2);min-width:70px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">#${p.number} ${p.name}</span>`;
        h+=`<div style="flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden"><div style="width:${bar}%;height:100%;background:var(--acc);border-radius:3px"></div></div>`;
        h+=`<span style="font-family:var(--fd);font-size:13px;font-weight:700;color:var(--t1);min-width:30px;text-align:right">${p[cat.key]}</span>`;
        h+=`</div>`;
      });
    }
    h+=`</div>`;
  });
  h+=`</div>`;

  // Average rankings
  h+=`<div style="font-family:var(--fd);font-size:14px;color:var(--acc);margin:20px 0 10px;border-bottom:1px solid var(--brd);padding-bottom:4px">ランキング（1試合平均）</div>`;
  h+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px">`;
  rankCats.forEach(function(cat){
    var sorted=pStats.filter(function(p){return p.gp>0&&p[cat.key]>0}).map(function(p){return Object.assign({},p,{avg:+(p[cat.key]/p.gp).toFixed(1)})}).sort(function(a,b){return b.avg-a.avg});
    h+=`<div style="background:var(--bgc);border:1px solid var(--brd);border-radius:8px;padding:10px">`;
    h+=`<div style="font-family:var(--fd);font-size:13px;font-weight:600;color:var(--t1);margin-bottom:6px">${cat.emoji} ${cat.label}/試合</div>`;
    if(!sorted.length){h+=`<div style="font-size:11px;color:var(--t3)">データなし</div>`}
    else{
      sorted.forEach(function(p,i){
        var medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
        var bar=sorted[0].avg>0?Math.round(p.avg/sorted[0].avg*100):0;
        h+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">`;
        h+=`<span style="font-size:12px;min-width:18px">${medal||'#'+(i+1)}</span>`;
        h+=`<span style="font-size:11px;color:var(--t2);min-width:70px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">#${p.number} ${p.name}</span>`;
        h+=`<div style="flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden"><div style="width:${bar}%;height:100%;background:var(--acc);border-radius:3px"></div></div>`;
        h+=`<span style="font-family:var(--fd);font-size:13px;font-weight:700;color:var(--t1);min-width:30px;text-align:right">${p.avg}</span>`;
        h+=`</div>`;
      });
    }
    h+=`</div>`;
  });
  h+=`</div>`;

  ct.innerHTML=h;
}

function buildCareerTable(pStats,isAvg){
  const cols=['選手','GP','PTS','2P','2P%','3P','3P%','FG','FG%','FT','FT%','REB','AST','STL','BLK','TO','PF','EFF'];
  let h=`<div style="overflow-x:auto;margin-bottom:12px"><table class="bt"><thead><tr>`;
  cols.forEach(c=>{h+=`<th>${c}</th>`});
  h+=`</tr></thead><tbody>`;
  pStats.forEach(p=>{
    const gp=p.gp||1;
    const d=v=>isAvg?(v/gp).toFixed(1):v;
    const fgp=p.fga?Math.round(p.fgm/p.fga*100):0,tpp=p.tpa?Math.round(p.tpm/p.tpa*100):0;
    const ftp=p.fta?Math.round(p.ftm/p.fta*100):0;
    const twop=p.twoa?Math.round(p.twom/p.twoa*100):0;
    h+=`<tr><td>#${p.number} ${p.name}</td><td>${p.gp}</td><td class="${p.pts>=10?'hi':''}">${d(p.pts)}</td><td>${isAvg?d(p.twom)+'/'+d(p.twoa):`${p.twom}/${p.twoa}`}</td><td>${twop}%</td><td>${isAvg?d(p.tpm)+'/'+d(p.tpa):`${p.tpm}/${p.tpa}`}</td><td>${tpp}%</td><td>${isAvg?d(p.fgm)+'/'+d(p.fga):`${p.fgm}/${p.fga}`}</td><td>${fgp}%</td><td>${isAvg?d(p.ftm)+'/'+d(p.fta):`${p.ftm}/${p.fta}`}</td><td>${ftp}%</td><td>${d(p.reb)}</td><td>${d(p.ast)}</td><td>${d(p.stl)}</td><td>${d(p.blk)}</td><td>${d(p.to)}</td><td>${d(p.pf)}</td><td style="font-weight:700">${d(p.eff)}</td></tr>`;
  });
  h+=`</tbody></table></div>`;
  return h;
}

function endGame(){if(!G||!confirm('この試合を終了しますか？'))return;
  const myScore=G.myQS.reduce((a,b)=>a+b,0),oppScore=G.oppQS.reduce((a,b)=>a+b,0);
  const existing=games.findIndex(g=>g.id===G.id);
  const entry={id:G.id,date:G.date,opponent:G.opponent,gameName:G.gameName||'',myScore,oppScore,myTeamId:G.myTeamId||myTeam.id||'',myTeamName:G.myTeamName||myTeam.name||'',data:JSON.parse(JSON.stringify(G))};
  if(existing>=0){games[existing]=entry}else{games.push(entry)}
  G=null;localStorage.removeItem('siq_c');save();showScreen('home');
}
function renderHist(){const l=document.getElementById('hlist');if(!games.length){l.innerHTML='<div class="empty">まだ試合データがありません</div>';return}l.innerHTML='';
  games.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')).forEach(g=>{const d=document.createElement('div');d.className='ghi';

    d.onclick=e=>{if(e.target.classList.contains('ghi-x'))return;ldG(g.id)};l.appendChild(d)})}
function delG(id,e){e.stopPropagation();if(!confirm('削除しますか？'))return;games=games.filter(g=>g.id!==id);save();renderHist()}
function ldG(id){const g=games.find(g=>g.id===id);if(!g||!g.data)return;G=JSON.parse(JSON.stringify(g.data));selSide='my';selId=null;save();showScreen('game')}
function editGameInfo(id,e){

function saveGameEdit(){

async function exportBoxPDF(){

  function mm(v){return Math.round(v*S)}

    bg:'#ffffff',

    mid:'#3a4555',

  // ===== Helpers =====
  function drawLine(ctx,x1,y1,x2,y2,color,w){

  }
  function roundRect(ctx,x,y,w,h,r,fill,stroke){
    ctx.beginPath();
    ctx.moveTo(mm(x+r),mm(y));
    ctx.lineTo(mm(x+w-r),mm(y));ctx.quadraticCurveTo(mm(x+w),mm(y),mm(x+w),mm(y+r));
    ctx.lineTo(mm(x+w),mm(y+h-r));ctx.quadraticCurveTo(mm(x+w),mm(y+h),mm(x+w-r),mm(y+h));
    ctx.lineTo(mm(x+r),mm(y+h));ctx.quadraticCurveTo(mm(x),mm(y+h),mm(x),mm(y+h-r));
    ctx.lineTo(mm(x),mm(y+r));ctx.quadraticCurveTo(mm(x),mm(y),mm(x+r),mm(y));
    ctx.closePath();
    if(fill){ctx.fillStyle=fill;ctx.fill()}

  // ===== PAGE 1 =====
  var p1=mkPage(),c1=p1.x;

  c1.textAlign='left';c1.fillText('HOME',mm(18),mm(22));
  c1.textAlign='right';c1.fillText('AWAY',mm(pw-18),mm(22));

  // --- Team Charts Section ---
  var chartY=36;

  c1.textAlign='left';c1.font='700 '+mm(3.5)+'px Oswald,sans-serif';c1.fillStyle=C.dark;

  // MY team charts
  var hmMy=drawZoneChart(460,280,getFilteredShots('my',-1,'all'));

  var hmOpp=drawZoneChart(460,280,getFilteredShots('opp',-1,'all'));
  var dtOpp=drawShotDots(300,240,getFilteredShots('opp',-1,'all'),'rgba(196,69,32,.75)');

  var cY=chartY+3;
  // Left half: MY
  roundRect(c1,10,cY,136,54,1.5,null,C.border);
  c1.drawImage(hmMy,mm(11),mm(cY+1),mm(84),mm(52));
  c1.drawImage(dtMy,mm(97),mm(cY+6),mm(46),mm(38));
  c1.font='600 '+mm(3)+'px Oswald,sans-serif';c1.fillStyle=C.accent;c1.textAlign='left';

  c1.font='400 '+mm(2.5)+'px Inter,sans-serif';c1.fillStyle=C.light;
  c1.fillText('\u30B7\u30E5\u30FC\u30C8\u5206\u5E03',mm(97),mm(cY+4.5));

  // Right half: OPP
  roundRect(c1,pw/2+2,cY,136,54,1.5,null,C.border);
  c1.drawImage(hmOpp,mm(pw/2+3),mm(cY+1),mm(84),mm(52));
  c1.drawImage(dtOpp,mm(pw/2+89),mm(cY+6),mm(46),mm(38));
  c1.font='600 '+mm(3)+'px Oswald,sans-serif';c1.fillStyle=C.opp;c1.textAlign='left';
  c1.fillText(oppLabel+' \u2014 \u30BE\u30FC\u30F3FG%',mm(pw/2+4),mm(cY+0.5));
  c1.font='400 '+mm(2.5)+'px Inter,sans-serif';c1.fillStyle=C.light;
  c1.fillText('\u30B7\u30E5\u30FC\u30C8\u5206\u5E03',mm(pw/2+89),mm(cY+4.5));

  // --- BOX Score Table ---
  function drawTbl(ctx,yStart,ps,side,qf,teamColor){
    var all=ps.map(function(_,i){return Object.assign({i:i},calcPS(side,i,qf))});
    var tot=all.reduce(function(t,s){Object.keys(s).forEach(function(k){if(k!=='i')t[k]=(t[k]||0)+s[k]});return t},{});
    var hdr=['','PTS','2P','2P%','3P','3P%','FG','FG%','FT','FT%','OR','DR','REB','AST','STL','BLK','TO','PF','EFF'];

    var totalW=cw.reduce(function(a,b){return a+b},0);
    var mg=10,rH=2.8,y=yStart;

    // Header row bg
    ctx.fillStyle=C.dark;ctx.fillRect(mm(mg),mm(y-1.2),mm(totalW),mm(3.5));
    ctx.font='700 '+mm(2.2)+'px Inter,sans-serif';ctx.fillStyle='#ffffff';ctx.textBaseline='middle';
    var rx=mg;

    ctx.font='400 '+mm(2.2)+'px Inter,sans-serif';ctx.textBaseline='middle';

        ctx.fillText(String(v),mm(i===0?rx+0.5:rx+cw[i]/2),mm(y+rH/2-0.5));
        rx+=cw[i];
      });
      y+=rH;
    });

    // Total row
    y+=0.3;
    ctx.fillStyle=teamColor;ctx.fillRect(mm(mg),mm(y),mm(totalW),mm(rH+0.3));
    var teff=calcEff(tot);
    var tfgp=tot.fga?Math.round(tot.fgm/tot.fga*100):0;

      // Player card background
      roundRect(px2,bx,by,138,90,2,null,C.border);

      px2.fillStyle=teamColor;px2.fillRect(mm(bx),mm(by),mm(1),mm(90));

      // Player number big
      px2.textAlign='left';

      px2.fillText(numStr,mm(bx+3),mm(by+9));

        {l:'AST',v:pStats2.ast}

        px2.fillText(ch.l,mm(chipX),mm(by+12));
        px2.font='700 '+mm(2.8)+'px Inter,sans-serif';px2.fillStyle=C.dark;
        px2.fillText(String(ch.v),mm(chipX),mm(by+15));

      var pcv=drawZoneChart(420,270,pShots);

    }
    if(pc){
      // Footer
      px2.fillStyle=C.dark;px2.fillRect(0,mm(ph-2),PW,mm(2));
      px2.font='400 '+mm(2)+'px Inter,sans-serif';px2.fillStyle='rgba(255,255,255,.5)';
      px2.textAlign='center';px2.fillText('Generated by Stat IQ',mm(pw/2),mm(ph-0.5));
      addPage(pc,false);
    }
  }
  addPlayerPages(myTeam.players,'my',myLabel,C.accent,C.accent2);
  addPlayerPages(G.oppPlayers,'opp',oppLabel,C.opp,C.opp2);

  var fn='StatIQ_'+(G.date||'game')+'_'+myLabel+'_vs_'+oppLabel+'.pdf';
  pdf.save(fn.replace(/\s/g,'_'));
}

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getAuth,GoogleAuthProvider,signInWithPopup,onAuthStateChanged,signOut as fbSignOut,browserLocalPersistence,setPersistence}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import{getFirestore,doc,setDoc,getDoc,onSnapshot}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig={
  apiKey:"AIzaSyBO2_N8gi_fGhKv7cQv-yTMvR329d2TLSw",
  authDomain:"animation-50e1f.firebaseapp.com",
  projectId:"animation-50e1f",
  storageBucket:"animation-50e1f.firebasestorage.app",
  messagingSenderId:"498744153399",
  appId:"1:498744153399:web:49290ed06f809a1221b6b2"
};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let _fbUser=null,_unsub=null,_saving=false;

// Auth persistence (same as Draw IQ)
setPersistence(auth,browserLocalPersistence).catch(e=>console.warn('Auth persistence:',e));

// Firestore offline cache (same as Draw IQ)
try{
  const{enableIndexedDbPersistence:_enIdb}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
  if(_enIdb)_enIdb(db).catch(()=>{});
}catch(e){}

function renderAuthBar(){
  const sec=document.getElementById('auth-section');if(!sec)return;
  if(_fbUser){
    sec.innerHTML=`<div class="auth-user"><img src="${_fbUser.photoURL||''}" onerror="this.style.display='none'"><span>${_fbUser.displayName||''}</span><button class="auth-logout" onclick="window._siqSignOut()">ログアウト</button></div>`;
  }else{
    sec.innerHTML=`<button class="auth-login-btn" onclick="window._siqSignIn()"><svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.9 33.6 29.4 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 8 3l5.7-5.7C34 6 29.3 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.7-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.3 15.3 18.8 12 24 12c3.1 0 5.8 1.2 8 3l5.7-5.7C34 6 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.2 26.7 36 24 36c-5.4 0-9.9-3.4-11.3-8.2l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.6l6.2 5.2C36.7 39.5 44 34 44 24c0-1.3-.1-2.7-.4-3.9z"/></svg>Googleでログイン</button>`;
  }
}

// Sign-in/out (same as Draw IQ: simple signInWithPopup)
window._siqSignIn=()=>signInWithPopup(auth,new GoogleAuthProvider());
window._siqSignOut=async()=>{
  if(!confirm('ログアウトしますか？'))return;
  if(_unsub){_unsub();_unsub=null}
  await fbSignOut(auth);_fbUser=null;renderAuthBar();
};

// Render login button immediately
renderAuthBar();

// Firestore data doc path
function fbDocRef(){return doc(db,'statiq_data',_fbUser.uid)}

// Save to Firestore (debounced)
let _fbSaveTimer=null;
const _origSave=window.save;
window.save=function(){
  _origSave();
  if(!_fbUser){console.log('[Stat IQ] save: no user, skipping Firestore');return;}
  clearTimeout(_fbSaveTimer);
  _fbSaveTimer=setTimeout(async()=>{
    _saving=true;
    try{
      console.log('[Stat IQ] saving to Firestore...',_fbUser.uid);
      await setDoc(fbDocRef(),{
        myTeam:JSON.parse(JSON.stringify(window.myTeam)),
        myTeams:JSON.parse(JSON.stringify(window.myTeams)),
        activeTeamIdx:window.activeTeamIdx,
        games:JSON.parse(JSON.stringify(window.games)),
        oppTeams:JSON.parse(JSON.stringify(window.oppTeams)),
        currentGame:window.G?JSON.parse(JSON.stringify(window.G)):null,
        updatedAt:Date.now()
      },{merge:true});
      console.log('[Stat IQ] Firestore save OK');
    }catch(e){console.error('Firestore save error',e)}
    _saving=false;
  },800);
};

// Load from Firestore — compare timestamps, push local if newer
async function fbLoad(){
  if(!_fbUser)return;
  try{
    const snap=await getDoc(fbDocRef());
    const localTs=window._localUpdatedAt||0;
    if(snap.exists()){
      const d=snap.data();
      const remoteTs=d.updatedAt||0;
      if(localTs>remoteTs){
        // Local is newer (offline edits) — push to Firestore
        console.log('[Stat IQ] Local data newer, pushing to Firestore',localTs,'>',remoteTs);
        await fbPush();
      }else{
        // Remote is newer or equal — pull from Firestore
        console.log('[Stat IQ] Remote data newer or equal, pulling',remoteTs,'>=',localTs);
        applyRemote(d);
      }
    }else{
      // No remote data yet — push local
      console.log('[Stat IQ] No remote data, pushing local');
      await fbPush();
    }
  }catch(e){console.error('Firestore load error',e)}
}

function applyRemote(d){
  if(d.myTeam)window.myTeam=d.myTeam;
  if(d.myTeams)window.myTeams=d.myTeams;
  if(d.activeTeamIdx!==undefined)window.activeTeamIdx=d.activeTeamIdx;
  if(d.games)window.games=d.games;
  if(d.oppTeams)window.oppTeams=d.oppTeams;
  if(d.currentGame!==undefined)window.G=d.currentGame;
  window._localUpdatedAt=d.updatedAt||Date.now();
  migrateZones();
  _origSave();
}

async function fbPush(){
  if(!_fbUser)return;
  _saving=true;
  try{
    const now=Date.now();
    await setDoc(fbDocRef(),{
      myTeam:JSON.parse(JSON.stringify(window.myTeam)),
      myTeams:JSON.parse(JSON.stringify(window.myTeams)),
      activeTeamIdx:window.activeTeamIdx,
      games:JSON.parse(JSON.stringify(window.games)),
      oppTeams:JSON.parse(JSON.stringify(window.oppTeams)),
      currentGame:window.G?JSON.parse(JSON.stringify(window.G)):null,
      updatedAt:now
    },{merge:true});
    window._localUpdatedAt=now;
    localStorage.setItem('siq_upd',now);
    console.log('[Stat IQ] fbPush OK');
  }catch(e){console.error('fbPush error',e)}
  _saving=false;
}

// Real-time sync listener — respect timestamps
function startSync(){
  if(_unsub)_unsub();
  _unsub=onSnapshot(fbDocRef(),snap=>{
    if(!snap.exists()||_saving)return;
    const d=snap.data();
    const remoteTs=d.updatedAt||0;
    const localTs=window._localUpdatedAt||0;
    if(localTs>remoteTs){
      // Local is newer, don't overwrite — push instead
      console.log('[Stat IQ] onSnapshot: local newer, skipping pull');
      return;
    }
    applyRemote(d);
    if(window.G&&document.getElementById('game').classList.contains('active')){
      window.renderPlayers();window.updateAll();window.drawCourt('my');window.drawCourt('opp');
    }
  });
}

// Flush pending local changes when coming back online
window.addEventListener('online',()=>{
  if(_fbUser){
    console.log('[Stat IQ] Back online, flushing to Firestore');
    fbPush();
  }
});

onAuthStateChanged(auth,async user=>{
  _fbUser=user;
  window._fbUser=user; // expose for debugging
  renderAuthBar();
  if(user){
    await fbLoad();
    startSync();
    if(window.G){window.selSide='my';window.selId=null;window.showScreen('game')}
  }
});
</script>

<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
</script>

</body>
</html>
